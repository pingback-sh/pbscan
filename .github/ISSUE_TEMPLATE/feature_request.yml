name: Feature request
description: Suggest a safe improvement to pbscan.
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What authorized workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and compatibility impact
      description: Explain traffic, data, authorization, and default-behavior implications.
    validations:
      required: true
